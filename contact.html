</head>
<body>
    <!-- 加载动画 -->
    <div class="loading-overlay">
        <span class="loading-text">朱一合</span>
    </div>

    <!-- 导航栏 -->
    <nav class="navbar">
        <a href="index.html" class="logo">
            <img src="logo.png" alt="朱一合" class="logo-img">

        <ul class="nav-links">

            <li><a href="culture.html">文化</a></li>
            <li><a href="contact.html" class="active">联系</a></li>
        </ul>
        <div class="hamburger">
            <span></span>
            <span></span>
            <span></span>
        </div>
    </nav>

    <!-- 页面头部 -->
    <section class="page-header">
        <div class="container">
            <p class="page-subtitle">CONTACT US</p>
            <h1 class="page-title">联系我们</h1>
            <div class="page-divider"></div>
        </div>
    </section>

    <!-- 联系我们 -->
    <section class="contact-section">
        <div class="container">
            <div class="contact-content">
                <div class="contact-info">
                    <h3>朱一合 · 心灵归处</h3>
                    <p class="contact-intro">无论您有任何关于线香的问题，或想分享您的使用体验，我们都期待与您交流。</p>

                    <div class="info-item">
                        <span class="label">地址：</span>
                        <span>杭州市西湖区龙井路88号</span>
                    </div>
                    <div class="info-item">
                        <span class="label">电话：</span>
                        <span>0571-8888-8888</span>
                    </div>
                    <div class="info-item">
                        <span class="label">邮箱：</span>
                        <span>zhuyihe@incense.com</span>
                    </div>
                    <div class="info-item">
                        <span class="label">营业：</span>
                        <span>周一至周日 10:00 - 20:00</span>
                    </div>

                    <div class="social-section">
                        <h4>关注我们</h4>
                        <div class="social-links">
                            <a href="#" class="social-icon">微店</a>
                            <a href="#" class="social-icon">小红书</a>
                            <a href="#" class="social-icon">微博</a>
                            <a href="#" class="social-icon">抖音</a>
                        </div>
                    </div>
                </div>

                <form class="contact-form">
                    <h3 class="form-title">留言咨询</h3>
                    <div class="form-group">
                        <label>您的姓名</label>
                        <input type="text" placeholder="请输入您的姓名" required>
                    </div>
                    <div class="form-group">
                        <label>联系电话</label>
                        <input type="tel" placeholder="请输入您的联系电话">
                    </div>
                    <div class="form-group">
                        <label>电子邮箱</label>
                        <input type="email" placeholder="请输入您的邮箱" required>
                    </div>
                    <div class="form-group">
                        <label>留言内容</label>
                        <textarea placeholder="请输入您的留言..." rows="5" required></textarea>
                    </div>
                    <button type="submit" class="submit-btn">发送留言</button>
                </form>
            </div>
        </div>
    </section>

    <!-- 页脚 -->
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-logo">朱一合</div>
                <p class="footer-slogan">一缕青烟 · 万般意境</p>
                <div class="footer-links">

                    <a href="#">使用条款</a>
                </div>
                <p class="copyright">© 2024 朱一合 版权所有 | 浙ICP备XXXXXXXX号</p>
